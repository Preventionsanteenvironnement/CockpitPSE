<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Quiz Émotions - Prof</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Inter',sans-serif; background:#0f172a; color:white; display:flex; height:100vh; overflow:hidden; user-select:none; }
        .sidebar { width:380px; background:#1e293b; border-right:1px solid #334155; display:flex; flex-direction:column; flex-shrink:0; }
        .sidebar-header { padding:15px; background:#0f172a; border-bottom:1px solid #334155; }
        .sec-head { padding:10px 15px; background:#162032; border-bottom:1px solid #334155; font-size:0.75rem; text-transform:uppercase; color:#94a3b8; font-weight:bold; display:flex; justify-content:space-between; }
        .sec-list { flex:1; overflow-y:auto; padding:6px; }
        #session-bar { padding:12px; background:#1a1a2e; border-bottom:1px solid #334155; }
        #session-bar label { font-size:0.7rem; color:#888; text-transform:uppercase; letter-spacing:1px; }
        .session-btns { display:flex; gap:6px; margin-top:6px; }
        .session-btns button { flex:1; padding:7px; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; font-size:0.8rem; }
        #session-id-display { font-size:0.7rem; color:#64748b; margin-top:6px; text-align:center; }
        .qr-wrap { text-align:center; margin-top:8px; }
        #qr-code { width:120px; height:120px; border-radius:8px; background:white; padding:4px; display:none; }
        #qr-label { font-size:0.6rem; color:#64748b; margin-top:4px; display:none; }

        .q-item { padding:8px 10px; margin-bottom:3px; border-radius:6px; cursor:pointer; transition:0.2s; font-size:0.8rem; display:flex; align-items:center; gap:8px; border:1px solid transparent; }
        .q-item:hover { background:#334155; }
        .q-item.active { border-color:#f59e0b; background:rgba(245,158,11,0.1); }
        .q-item .q-emoji { font-size:1.2rem; flex-shrink:0; }
        .q-item .q-fam { font-size:0.65rem; color:#64748b; margin-left:auto; flex-shrink:0; }

        .main-content { flex-grow:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; background:radial-gradient(circle at center,#1e293b 0%,#0f172a 100%); padding:40px; }
        .btn-projection { position:absolute; top:15px; right:15px; background:#f59e0b; color:#0f172a; border:none; padding:8px 15px; border-radius:20px; font-weight:bold; cursor:pointer; z-index:50; }

        #display-emotion { font-size:5rem; font-weight:900; color:#fff; text-align:center; text-shadow:0 0 40px rgba(255,255,255,0.1); margin-bottom:10px; }
        #display-instruction { font-size:1.2rem; color:#94a3b8; text-align:center; margin-bottom:30px; }

        .bars-container { width:100%; max-width:700px; }
        .bar-row { display:flex; align-items:center; margin-bottom:8px; gap:10px; }
        .bar-label { width:100px; text-align:right; font-weight:700; font-size:0.85rem; flex-shrink:0; }
        .bar-bg { flex:1; height:35px; background:#334155; border-radius:8px; overflow:hidden; position:relative; }
        .bar-fill { height:100%; transition:width 0.5s; border-radius:8px; display:flex; align-items:center; padding-left:10px; font-weight:bold; font-size:0.85rem; }
        .bar-fill.correct-bar { box-shadow:0 0 15px rgba(255,255,255,0.3); }

        .action-bar { position:absolute; bottom:20px; display:flex; gap:15px; }
        .btn-reveal { padding:15px 40px; border:none; border-radius:12px; font-size:1.2rem; font-weight:800; cursor:pointer; background:#f59e0b; color:#0f172a; box-shadow:0 4px 0 #d97706; }
        .btn-reveal:active { transform:translateY(4px); box-shadow:none; }
        .btn-reveal:disabled { opacity:0.4; cursor:not-allowed; }
        .btn-lock { padding:12px 25px; border:1px solid #22c55e; color:#22c55e; background:none; border-radius:12px; cursor:pointer; font-weight:bold; font-size:1rem; }

        .correct-answer { display:none; text-align:center; margin-top:20px; }
        .correct-answer .ca-text { font-size:2rem; font-weight:900; color:#22c55e; }
        .student-row { padding:6px 8px; border-bottom:1px solid #334155; font-size:0.85rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><h2 style="margin:0;font-size:1.1rem;">🧠 QUIZ ÉMOTIONS</h2></div>
        <div id="session-bar">
            <label>Session</label>
            <div class="session-btns">
                <button onclick="newSession()" style="background:#2ecc71;">🆕 Nouvelle</button>
                <button onclick="resetSession()" style="background:#e74c3c;">🗑️ Reset</button>
            </div>
            <div id="session-id-display"></div>
            <div class="qr-wrap"><img id="qr-code" src="" alt="QR"><div id="qr-label">📱 Scannez</div></div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
            <div class="sec-head"><span>📋 Émotions (cliquez)</span><span id="q-progress">0/30</span></div>
            <div class="sec-list" id="questions-list"></div>
        </div>
        <div style="flex:0.3; display:flex; flex-direction:column; overflow:hidden; border-top:1px solid #334155;">
            <div class="sec-head"><span>👥 Présents <span id="student-count">(0)</span></span></div>
            <div class="sec-list" id="student-list"></div>
        </div>
    </div>

    <div class="main-content">
        <button class="btn-projection" onclick="toggleProjection()">📺 Projection</button>
        <div id="display-instruction">Sélectionnez une émotion dans la liste</div>
        <div id="display-emotion">🧠</div>
        <div class="bars-container" id="bars-container"></div>
        <div class="correct-answer" id="correct-answer"><div class="ca-text" id="ca-text"></div></div>
        <div class="action-bar">
            <button class="btn-lock" id="btn-lock" onclick="toggleLock()">🔓 Ouvert</button>
            <button class="btn-reveal" id="btn-reveal" onclick="revealAnswer()" disabled>✨ RÉVÉLER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, getDocs, writeBatch, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey:"AIzaSyAWdCMvOiAJln3eT9LIAQD3RWJUD0lQcLI", authDomain:"devoirs-pse.firebaseapp.com", projectId:"devoirs-pse", storageBucket:"devoirs-pse.firebasestorage.app", messagingSenderId:"614730413904", appId:"1:614730413904:web:a5dd478af5de30f6bede55" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const FAMILLES = [
            { nom:'Joie', color:'#22c55e' }, { nom:'Amour', color:'#ec4899' },
            { nom:'Peur', color:'#8b5cf6' }, { nom:'Colère', color:'#ef4444' },
            { nom:'Tristesse', color:'#3b82f6' }, { nom:'Dégoût', color:'#84cc16' },
            { nom:'Surprise', color:'#f59e0b' }
        ];

        const QUIZ = [
            {e:"Satisfait",f:"Joie"},{e:"Émerveillé",f:"Joie"},{e:"En extase",f:"Joie"},{e:"Content",f:"Joie"},
            {e:"Tendre",f:"Amour"},{e:"Passionné",f:"Amour"},{e:"Affectueux",f:"Amour"},{e:"En adoration",f:"Amour"},
            {e:"Anxieux",f:"Peur"},{e:"Terrifié",f:"Peur"},{e:"Préoccupé",f:"Peur"},{e:"Paniqué",f:"Peur"},
            {e:"Irrité",f:"Colère"},{e:"Exaspéré",f:"Colère"},{e:"Furieux",f:"Colère"},{e:"Contrarié",f:"Colère"},{e:"Enragé",f:"Colère"},
            {e:"Chagriné",f:"Tristesse"},{e:"Déprimé",f:"Tristesse"},{e:"Accablé",f:"Tristesse"},{e:"Peiné",f:"Tristesse"},
            {e:"Écœuré",f:"Dégoût"},{e:"Incommodé",f:"Dégoût"},{e:"Amer",f:"Dégoût"},{e:"Horripilé",f:"Dégoût"},
            {e:"Stupéfait",f:"Surprise"},{e:"Ébahi",f:"Surprise"},{e:"Étonné",f:"Surprise"},{e:"Embarrassé",f:"Surprise"},{e:"Frappé",f:"Surprise"}
        ];

        let currentSessionId = localStorage.getItem('quiz_emo_sessionId') || null;
        let unsubReponses = null, unsubPresence = null;
        let activeIdx = -1;
        let questionsPlayed = 0;

        function generateSessionId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 4); }

        // Render questions list
        const qList = document.getElementById('questions-list');
        QUIZ.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'q-item'; div.id = 'qi-' + i;
            div.innerHTML = '<span class="q-emoji">💬</span><span>' + q.e + '</span><span class="q-fam">' + q.f + '</span>';
            div.onclick = () => launchQuestion(i);
            qList.appendChild(div);
        });

        // Render bars
        const barsContainer = document.getElementById('bars-container');
        FAMILLES.forEach(f => {
            barsContainer.innerHTML += '<div class="bar-row"><div class="bar-label" style="color:' + f.color + ';">' + f.nom + '</div><div class="bar-bg"><div class="bar-fill" id="bf-' + f.nom + '" style="background:' + f.color + ';width:0%;"></div></div></div>';
        });

        async function launchQuestion(idx) {
            activeIdx = idx;
            questionsPlayed++;
            document.querySelectorAll('.q-item').forEach(el => el.classList.remove('active'));
            document.getElementById('qi-' + idx).classList.add('active');
            document.getElementById('display-emotion').innerText = QUIZ[idx].e.toUpperCase();
            document.getElementById('display-instruction').innerText = 'À quelle famille appartient cette émotion ?';
            document.getElementById('correct-answer').style.display = 'none';
            document.getElementById('btn-reveal').disabled = false;
            document.getElementById('q-progress').innerText = questionsPlayed + '/' + QUIZ.length;

            FAMILLES.forEach(f => { document.getElementById('bf-' + f.nom).style.width = '0%'; document.getElementById('bf-' + f.nom).classList.remove('correct-bar'); });

            await setDoc(doc(db, "quiz_emo_config", "global"), {
                emotion: QUIZ[idx].e, correctFamily: QUIZ[idx].f,
                showResult: false, isLocked: false, sessionId: currentSessionId
            }, { merge: true });
            setupResponseListener();
        }

        function setupResponseListener() {
            if (unsubReponses) unsubReponses();
            if (!currentSessionId || activeIdx < 0) return;
            const q = query(collection(db, "quiz_emo_reponses"), where("sessionId", "==", currentSessionId));
            unsubReponses = onSnapshot(q, (snap) => {
                let counts = {}; let total = 0;
                FAMILLES.forEach(f => counts[f.nom] = 0);
                snap.forEach(d => {
                    const data = d.data();
                    if (data.reponse && data.timestamp > Date.now() - 300000) {
                        counts[data.reponse] = (counts[data.reponse] || 0) + 1; total++;
                    }
                });
                FAMILLES.forEach(f => {
                    const pct = total > 0 ? Math.round(counts[f.nom] / total * 100) : 0;
                    const el = document.getElementById('bf-' + f.nom);
                    el.style.width = pct + '%';
                    el.innerText = pct > 5 ? counts[f.nom] + '' : '';
                });
            });
        }

        window.revealAnswer = async () => {
            if (activeIdx < 0) return;
            const correct = QUIZ[activeIdx].f;
            await setDoc(doc(db, "quiz_emo_config", "global"), { showResult: true, isLocked: true }, { merge: true });
            document.getElementById('correct-answer').style.display = 'block';
            document.getElementById('ca-text').innerText = '✅ ' + correct;
            document.getElementById('btn-reveal').disabled = true;
            const el = document.getElementById('bf-' + correct);
            if (el) el.classList.add('correct-bar');

            // Clear responses for next question
            setTimeout(async () => {
                const batch = writeBatch(db);
                const q = query(collection(db, "quiz_emo_reponses"), where("sessionId", "==", currentSessionId));
                (await getDocs(q)).forEach(d => batch.delete(d.ref));
                await batch.commit();
            }, 4000);
        };

        window.toggleLock = async () => {
            const btn = document.getElementById('btn-lock');
            const isOpen = btn.innerText.includes("Ouvert");
            await setDoc(doc(db, "quiz_emo_config", "global"), { isLocked: isOpen }, { merge: true });
            btn.innerText = isOpen ? "🔒 Fermé" : "🔓 Ouvert";
            btn.style.color = isOpen ? "#ef4444" : "#22c55e";
            btn.style.borderColor = isOpen ? "#ef4444" : "#22c55e";
        };

        window.newSession = async () => {
            currentSessionId = generateSessionId();
            localStorage.setItem('quiz_emo_sessionId', currentSessionId);
            await setDoc(doc(db, "quiz_emo_config", "global"), { sessionId: currentSessionId, emotion: '', showResult: false, isLocked: false });
            document.getElementById('session-id-display').textContent = '🔑 ' + currentSessionId;
            const url = 'https://preventionsanteenvironnement.github.io/PSE/eleve_quiz_emotions.html?sessionId=' + currentSessionId;
            document.getElementById('qr-code').src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&margin=0&data=' + encodeURIComponent(url);
            document.getElementById('qr-code').style.display = 'block';
            document.getElementById('qr-label').style.display = 'block';
            setupPresenceListener();
        };

        window.resetSession = async () => {
            if (!currentSessionId || !confirm("⚠️ Tout effacer ?")) return;
            const batch = writeBatch(db);
            for (const col of ["quiz_emo_reponses", "quiz_emo_presence"]) {
                const q = query(collection(db, col), where("sessionId", "==", currentSessionId));
                (await getDocs(q)).forEach(d => batch.delete(d.ref));
            }
            await batch.commit(); location.reload();
        };

        function setupPresenceListener() {
            if (!currentSessionId) return;
            if (unsubPresence) unsubPresence();
            const q = query(collection(db, "quiz_emo_presence"), where("sessionId", "==", currentSessionId));
            unsubPresence = onSnapshot(q, (snap) => {
                const list = document.getElementById('student-list');
                list.innerHTML = ''; let count = 0;
                snap.forEach(d => { count++; list.innerHTML += '<div class="student-row">👤 ' + d.data().name + '</div>'; });
                document.getElementById('student-count').innerText = '(' + count + ')';
            });
        }

        window.toggleProjection = () => {
            const w = window.open("", "_blank");
            w.document.write(document.documentElement.outerHTML);
            w.document.close();
            const style = w.document.createElement('style');
            style.innerHTML = '.sidebar{display:none!important;}.btn-projection{display:none!important;}';
            w.document.head.appendChild(style);
        };

        if (currentSessionId) {
            document.getElementById('session-id-display').textContent = '🔑 ' + currentSessionId;
            const url = 'https://preventionsanteenvironnement.github.io/PSE/eleve_quiz_emotions.html?sessionId=' + currentSessionId;
            document.getElementById('qr-code').src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&margin=0&data=' + encodeURIComponent(url);
            document.getElementById('qr-code').style.display = 'block';
            document.getElementById('qr-label').style.display = 'block';
            setupPresenceListener();
        } else { window.newSession(); }
    </script>
</body>
</html>
