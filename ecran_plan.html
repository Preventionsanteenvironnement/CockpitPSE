<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Plan de Classe - Écran</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #eef2f5; color: #333; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #header { height: 80px; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 10; flex-shrink: 0; }
        #class-title { font-size: 2.5rem; font-weight: 900; color: #2c3e50; text-transform: uppercase; letter-spacing: 2px; }

        /* Salle dynamique */
        #classroom {
            position: relative;
            flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 30px 30px;
        }
        #scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            transform-origin: center center;
            transition: transform 0.22s ease;
            will-change: transform;
        }

        /* Zone avant : tableau + repere prof */
        .front-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            transition: 0.4s ease;
        }
        .front-zone.vertical {
            align-items: center;
        }
        .teacher-marker {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 120px;
            padding-top: 4px;
        }
        .teacher-figure {
            position: relative;
            width: 78px;
            height: 100px;
            filter: drop-shadow(0 10px 14px rgba(51, 65, 85, 0.18));
        }
        .teacher-head {
            position: absolute;
            top: 0;
            left: 50%;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #334155;
            transform: translateX(-50%);
        }
        .teacher-body {
            position: absolute;
            top: 24px;
            left: 50%;
            width: 34px;
            height: 42px;
            border-radius: 16px 16px 10px 10px;
            background: linear-gradient(180deg, #334155 0%, #1e3a5f 100%);
            transform: translateX(-50%);
        }
        .teacher-arm {
            position: absolute;
            top: 34px;
            left: 50%;
            width: 58px;
            height: 12px;
            border-radius: 999px;
            background: #334155;
            transform: translateX(-50%);
        }
        .teacher-book {
            position: absolute;
            top: 37px;
            left: 50%;
            width: 22px;
            height: 18px;
            border-radius: 4px;
            background: #f59e0b;
            transform: translateX(8px) rotate(10deg);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.35);
        }
        .teacher-legs::before,
        .teacher-legs::after {
            content: "";
            position: absolute;
            bottom: 8px;
            width: 10px;
            height: 30px;
            border-radius: 999px;
            background: #334155;
        }
        .teacher-legs::before { left: 28px; transform: rotate(8deg); }
        .teacher-legs::after { right: 28px; transform: rotate(-8deg); }
        .teacher-label {
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            color: #475569;
            font-size: 0.82rem;
            font-weight: 900;
            letter-spacing: 0.16em;
            box-shadow: 0 8px 18px rgba(148, 163, 184, 0.2);
        }
        .teacher-floor {
            width: 86px;
            height: 14px;
            border-radius: 999px;
            background: rgba(59, 130, 246, 0.12);
            box-shadow: inset 0 0 0 1px rgba(59, 130, 246, 0.12);
        }

        /* Tableau Mobile */
        .board {
            background: #34495e; color: #bdc3c7; font-weight: bold; letter-spacing: 2px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 1rem; margin: 20px;
        }
        .board.horizontal { width: min(68vw, 980px); height: 38px; }
        .board.vertical { width: 38px; height: min(62vh, 720px); writing-mode: vertical-rl; transform: rotate(180deg); }

        /* Grille */
        #grid { display: grid; gap: 14px; padding: 14px; transition: 0.5s; }

        /* CASES */
        .cell {
            width: 140px; height: 90px; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; transition: all 0.3s;
        }

        /* TYPES (Identiques au prof) */
        .cell.type-1 { background: white; box-shadow: 0 6px 0 #cbd5e1; border: 2px solid #e2e8f0; overflow: hidden; } /* Table */
        .student-name {
            position: relative;
            z-index: 1;
            font-size: 1.5rem;
            font-weight: 800;
            color: #2c3e50;
            text-align: center;
            line-height: 1.1;
        }

        .cell.type-0 { border: 2px dashed rgba(203, 213, 225, 0.5); opacity: 0; } /* Vide */

        .cell.type-2 { background: #94a3b8; opacity: 0.5; border-radius: 4px; } /* Mur */
        .cell.type-2::after { content: "🧱"; font-size: 2rem; opacity: 0.5; }

        .cell.type-3 { background: #fcd34d; border: 4px solid #f59e0b; opacity: 0.9; } /* Porte */
        .cell.type-3::after { content: "🚪 PORTE"; font-weight: bold; color: #b45309; font-size: 0.9rem; }

        .cell.type-4 { background: #e0f2fe; border: 4px solid #38bdf8; opacity: 0.8; } /* Fenêtre */
        .cell.type-4::after { content: "🪟"; font-size: 2rem; }

        #waiting-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 2rem; color: #94a3b8; font-weight: bold; text-align: center; }

        /* ── IMPRESSION ── */
        @media print {
            body {
                height: auto !important;
                overflow: visible !important;
                background: white !important;
                display: block !important;
            }
            #header {
                height: auto !important;
                box-shadow: none !important;
                padding: 10px 0;
                page-break-after: avoid;
            }
            #class-title { font-size: 1.8rem; }
            #classroom {
                display: block !important;
                padding: 0 !important;
                background-image: none !important;
                overflow: visible !important;
            }
            #scene {
                transform: none !important;
                transition: none !important;
                width: 100% !important;
            }
            .front-zone { gap: 6px !important; }
            .teacher-marker { transform: scale(0.7); }
            .board.horizontal { width: 80% !important; height: 30px !important; font-size: 0.8rem; margin: 8px auto !important; }
            .board.vertical { height: 400px !important; width: 30px !important; font-size: 0.8rem; margin: 8px !important; }
            #grid {
                gap: 8px !important;
                padding: 8px !important;
                width: auto !important;
                justify-content: center !important;
            }
            .cell {
                width: 100px !important;
                height: 60px !important;
                border-radius: 8px !important;
                box-shadow: none !important;
                border: 2px solid #ccc !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .cell.type-1 { background: white !important; border: 2px solid #999 !important; }
            .cell.type-0 { opacity: 0 !important; }
            .student-name { font-size: 1.1rem !important; }
            #waiting-msg { display: none !important; }
        }

    </style>
</head>
<body>

    <div id="header"><div id="class-title">...</div></div>

        <div id="classroom">
        <div id="scene">
            <div id="front-zone" class="front-zone">
                <div id="teacher-marker" class="teacher-marker" aria-label="Zone professeur">
                    <div class="teacher-figure" aria-hidden="true">
                        <span class="teacher-head"></span>
                        <span class="teacher-body"></span>
                        <span class="teacher-arm"></span>
                        <span class="teacher-book"></span>
                        <span class="teacher-legs"></span>
                    </div>
                    <div class="teacher-label">PROF</div>
                    <div class="teacher-floor" aria-hidden="true"></div>
                </div>
                <div id="board" class="board horizontal">TABLEAU</div>
            </div>
            <div id="grid"></div>
        </div>
        <div id="waiting-msg">En attente du plan...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAWdCMvOiAJln3eT9LIAQD3RWJUD0lQcLI", authDomain: "devoirs-pse.firebaseapp.com", projectId: "devoirs-pse", storageBucket: "devoirs-pse.appspot.com", messagingSenderId: "614730413904", appId: "1:614730413904:web:a5dd478af5de30f6bede55", measurementId: "G-7R9N0JL6GG" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        const LOCAL_PLAN_KEY = "classe_plan_local";
        const LOCAL_PLAN_PING_KEY = "classe_plan_local_ping";
        let currentPlanData = null;

        function renderLocalPlan() {
            try {
                const raw = localStorage.getItem(LOCAL_PLAN_KEY);
                if (!raw) return false;
                const data = JSON.parse(raw);
                if (!data || typeof data !== "object") return false;
                renderPlan(data);
                return true;
            } catch (e) {
                console.error("Plan local invalide:", e);
                return false;
            }
        }

        // Chargement immédiat (utile si projection ouverte après un envoi).
        renderLocalPlan();

        // Mises à jour live depuis la fenêtre prof (fallback local).
        window.addEventListener("storage", (e) => {
            if (e.key === LOCAL_PLAN_KEY || e.key === LOCAL_PLAN_PING_KEY) {
                renderLocalPlan();
            }
        });

        // Mises à jour directes depuis la fenêtre prof (fallback le plus fiable en local).
        window.addEventListener("message", (event) => {
            const data = event && event.data;
            if (data && data.type === "classe_plan" && data.payload && typeof data.payload === "object") {
                renderPlan(data.payload);
            }
        });

        onSnapshot(
            doc(db, "classe_etat", "config"),
            (docSnap) => {
                if (docSnap.exists()) renderPlan(docSnap.data());
                else renderLocalPlan();
            },
            (error) => {
                console.error("Erreur lecture plan Firestore:", error);
                if (error && error.code === "permission-denied") {
                    const wait = document.getElementById("waiting-msg");
                    wait.innerText = "Accès Firestore refusé.\nEn attente du plan local...";
                }
                renderLocalPlan();
            }
        );

        function renderPlan(data) {
            const grid = document.getElementById('grid');
            const title = document.getElementById('class-title');
            const wait = document.getElementById('waiting-msg');
            const board = document.getElementById('board');
            const scene = document.getElementById('scene');
            const frontZone = document.getElementById('front-zone');

            if(!data.className) { wait.style.display = 'block'; title.innerText = "..."; grid.innerHTML = ""; return; }
            currentPlanData = data;
            wait.style.display = 'none';
            title.innerText = data.className;
            grid.style.gridTemplateColumns = `repeat(${data.cols}, minmax(90px, 140px))`;
            grid.innerHTML = "";

            // Position Tableau
            board.className = "board";
            frontZone.className = "front-zone";
            scene.style.flexDirection = 'column';
            const pos = data.boardPos || 'top';
            if(pos === 'top') { scene.style.flexDirection = 'column'; board.classList.add('horizontal'); }
            if(pos === 'bottom') { scene.style.flexDirection = 'column-reverse'; board.classList.add('horizontal'); }
            if(pos === 'left') { scene.style.flexDirection = 'row'; frontZone.classList.add('vertical'); board.classList.add('vertical'); }
            if(pos === 'right') { scene.style.flexDirection = 'row-reverse'; frontZone.classList.add('vertical'); board.classList.add('vertical'); }

            const total = data.rows * data.cols;
            
            for(let i=0; i<total; i++) {
                const type = (data.structure && data.structure[i] !== undefined) ? data.structure[i] : 1;
                const student = data.placements[i];
                
                const cell = document.createElement('div');
                cell.className = `cell type-${type}`;
                
                if(type === 1 && student) {
                    cell.innerHTML = `<span class="student-name">${student}</span>`;
                }
                grid.appendChild(cell);
            }

            requestAnimationFrame(fitSceneToViewport);
        }

        function fitSceneToViewport() {
            const classroom = document.getElementById('classroom');
            const scene = document.getElementById('scene');
            if (!classroom || !scene) return;

            scene.style.transform = 'scale(1)';
            const availableWidth = Math.max(0, classroom.clientWidth - 24);
            const availableHeight = Math.max(0, classroom.clientHeight - 24);
            const neededWidth = scene.scrollWidth;
            const neededHeight = scene.scrollHeight;
            if (!neededWidth || !neededHeight) return;

            const scale = Math.min(availableWidth / neededWidth, availableHeight / neededHeight, 1);
            scene.style.transform = `scale(${Math.max(scale, 0.55)})`;
        }

        window.addEventListener('resize', () => {
            if (currentPlanData) requestAnimationFrame(fitSceneToViewport);
        });
    </script>
</body>
</html>
