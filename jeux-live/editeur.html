<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Party Live - Editeur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;750;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/jeux-live.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">PL</div>
        <div>
          <h1>Editeur Party Live</h1>
          <p>Creation, import et export JSON</p>
        </div>
      </div>
      <nav class="nav-links">
        <a href="../index.html">Cockpit</a>
        <a href="bibliotheque.html">Bibliotheque</a>
        <a href="animateur.html">Animateur</a>
      </nav>
    </header>
    <main class="page editor-layout">
      <section class="card stack">
        <h2>Assistant de creation</h2>
        <label for="typeSelect">Type de jeu</label>
        <select id="typeSelect"></select>
        <button id="newGameBtn" class="btn">Nouveau modele</button>
        <label for="titleInput">Titre</label>
        <input id="titleInput" placeholder="Titre du jeu">
        <label for="descriptionInput">Description</label>
        <textarea id="descriptionInput" style="min-height:90px;" placeholder="Description courte"></textarea>
        <div class="row">
          <button id="syncFormBtn" class="btn">Mettre a jour le JSON</button>
          <button id="addRoundBtn" class="btn">Ajouter un item</button>
        </div>
        <div id="formStatus" class="notice" style="display:none;"></div>
        <div class="preview-frame">
          <h3>Apercu projecteur</h3>
          <div id="projectorPreview"></div>
          <hr>
          <h3>Apercu mobile</h3>
          <div id="mobilePreview"></div>
        </div>
      </section>

      <section class="card stack">
        <div class="between">
          <h2>JSON</h2>
          <div class="row">
            <button id="validateBtn" class="btn small">Valider</button>
            <button id="copyBtn" class="btn small">Copier</button>
            <button id="exportBtn" class="btn small">Exporter</button>
            <button id="saveBtn" class="btn primary small">Sauvegarder</button>
          </div>
        </div>
        <textarea id="jsonArea" class="json-area" spellcheck="false"></textarea>
        <div id="jsonStatus" class="notice" style="display:none;"></div>
      </section>
    </main>
  </div>
  <script type="module" src="assets/js/editeur.js"></script>
</body>
</html>
