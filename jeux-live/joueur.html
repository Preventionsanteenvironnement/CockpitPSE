<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Party Live - Joueur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;750;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/jeux-live.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">PL</div>
        <div>
          <h1>Party Live</h1>
          <p>Interface joueur</p>
        </div>
      </div>
      <nav class="nav-links">
        <a href="animateur.html">Animateur</a>
      </nav>
    </header>
    <main class="page phone-wrap">
      <section id="joinCard" class="card stack">
        <h2>Rejoindre une partie</h2>
        <label for="partyInput">Code partie</label>
        <input id="partyInput" placeholder="ABCD" maxlength="8" autocomplete="off">
        <label for="pseudoInput">Pseudo</label>
        <input id="pseudoInput" placeholder="Ton pseudo" maxlength="28" autocomplete="name">
        <button id="joinBtn" class="btn primary mobile-action">Entrer</button>
        <div id="joinError" class="notice error" style="display:none;"></div>
      </section>

      <section id="playerCard" class="card stack" style="display:none;">
        <div class="between">
          <div>
            <h2 id="helloPlayer">Bonjour</h2>
            <p class="muted" id="partyInfo">En attente</p>
          </div>
          <span class="pill" id="myScore">0 point</span>
        </div>
        <div id="playerContent" class="stack"></div>
        <div id="playerActions" class="stack"></div>
        <div id="playerNotice" class="notice" style="display:none;"></div>
      </section>
    </main>
  </div>
  <script type="module" src="assets/js/joueur.js"></script>
</body>
</html>
